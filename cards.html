<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cards — Scoots Collects</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">Scoots Collects</a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="cards.html" class="nav-link active">Cards</a>
    </div>
  </nav>

  <section class="hero hero--small">
    <div class="hero-eyebrow">Portfolio</div>
    <div class="hero-title">Card Tracker</div>
  </section>

  <div class="toolbar">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="sold">Sold</button>
      <button class="filter-btn" data-filter="MLB">MLB</button>
      <button class="filter-btn" data-filter="NBA">NBA</button>
      <button class="filter-btn" data-filter="NFL">NFL</button>
      <button class="filter-btn" data-filter="NHL">NHL</button>
    </div>
    <button class="btn-add" id="btn-add-card">+ Add Card</button>
  </div>

  <div class="table-wrap">
    <table class="cards-table">
      <thead>
        <tr>
          <th>Player</th><th>Sport</th><th>Purpose</th><th>Set</th><th>Cond.</th>
          <th>Purchase Date</th><th>Paid</th><th>Current</th><th>Target Sell</th>
          <th>Thesis</th><th>Notes</th><th>Status</th>
          <th>Sale Date</th><th>Sale Price</th><th>Site</th><th>P&amp;L</th>
          <th>Images</th><th></th>
        </tr>
      </thead>
      <tbody id="cards-tbody">
        <tr><td colspan="18" class="table-loading">Loading cards…</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="site-footer">
    <div class="footer-brand">Scoots Collects</div>
    <div class="footer-note">Personal card portfolio tracker</div>
  </footer>

  <!-- ADD CARD MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Card</span>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form class="modal-form" id="card-form">
        <input type="hidden" id="f-id" />

        <div class="form-row">
          <div class="form-group">
            <label>Player Name *</label>
            <input type="text" id="f-name" required placeholder="e.g. Mike Trout" />
          </div>
          <div class="form-group form-group--sm">
            <label>Purpose *</label>
            <select id="f-purpose" required>
              <option value="RESALE">RESALE</option>
              <option value="PC">PC</option>
            </select>
          </div>
          <div class="form-group form-group--sm">
            <label>Sport *</label>
            <select id="f-sport" required>
              <option value="">—</option>
              <option value="MLB">MLB</option>
              <option value="NBA">NBA</option>
              <option value="NFL">NFL</option>
              <option value="NHL">NHL</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Set</label>
            <input type="text" id="f-set" placeholder="e.g. 2024 Topps Chrome" />
          </div>
          <div class="form-group form-group--sm">
            <label>Condition</label>
            <select id="f-condition">
              <option value="PSA 10">PSA 10</option>
              <option value="PSA 9">PSA 9</option>
              <option value="PSA 8">PSA 8</option>
              <option value="PSA 7">PSA 7</option>
              <option value="PSA 6">PSA 6</option>
              <option value="PSA 5">PSA 5</option>
              <option value="PSA 4">PSA 4</option>
              <option value="PSA 3">PSA 3</option>
              <option value="PSA 2">PSA 2</option>
              <option value="PSA 1">PSA 1</option>
              <option value="PSA AUTHENTIC">PSA AUTHENTIC</option>
              <option value="BGS 10 (BLACK)">BGS 10 (BLACK)</option>
              <option value="BGS 10">BGS 10</option>
              <option value="BGS 9.5">BGS 9.5</option>
              <option value="BGS 9">BGS 9</option>
              <option value="BGS 8.5">BGS 8.5</option>
              <option value="RAW">RAW</option>
              <option value="SEALED">SEALED</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Price Paid ($) *</label>
            <input type="number" id="f-price-paid" step="0.01" min="0" required placeholder="0.00" />
          </div>
          <div class="form-group form-group--sm">
            <label>Purchase Date</label>
            <input type="date" id="f-purchase-date" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Current Price ($)</label>
            <input type="number" id="f-current-price" step="0.01" min="0" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label>Target Sell ($)</label>
            <input type="number" id="f-target-sell" step="0.01" min="0" placeholder="auto (×1.20)" />
          </div>
        </div>

        <div class="form-group">
          <label>Investment Thesis</label>
          <input type="text" id="f-thesis" placeholder="Why are you holding this card?" />
        </div>

        <div class="form-group">
          <label>Notes</label>
          <input type="text" id="f-notes" placeholder="e.g. Auto /150, numbered" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Front Image URL</label>
            <input type="url" id="f-image-front" placeholder="https://i.imgur.com/…" />
          </div>
          <div class="form-group">
            <label>Back Image URL</label>
            <input type="url" id="f-image-back" placeholder="https://i.imgur.com/…" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group form-group--sm">
            <label>Status *</label>
            <select id="f-status" required>
              <option value="active">Active</option>
              <option value="sold">Sold</option>
            </select>
          </div>
        </div>

        <div id="sold-fields" style="display:none">
          <div class="form-row">
            <div class="form-group">
              <label>Sale Date</label>
              <input type="date" id="f-sale-date" />
            </div>
            <div class="form-group">
              <label>Sale Price ($)</label>
              <input type="number" id="f-sale-price" step="0.01" min="0" placeholder="0.00" />
            </div>
            <div class="form-group">
              <label>Sale Site</label>
              <input type="text" id="f-sale-site" placeholder="e.g. eBay" />
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn-save">Save Card</button>
        </div>
      </form>
    </div>
  </div>

  <!-- IMAGE LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox-overlay">
    <div class="lightbox">
      <div class="lightbox-tabs">
        <button class="lightbox-tab active" id="lb-tab-front">Front</button>
        <button class="lightbox-tab" id="lb-tab-back">Back</button>
      </div>
      <img class="lightbox-img" id="lightbox-img" src="" alt="Card image" />
      <button class="lightbox-close" id="lightbox-close">&times;</button>
    </div>
  </div>

  <script src="js/cards.js"></script>
</body>
</html>
